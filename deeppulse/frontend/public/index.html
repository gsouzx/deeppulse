<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeepPulse — Survive the Abyss</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    /* ===== DESIGN TOKENS ===== */
    :root {
      --abyss:      #010812;
      --deep:       #030f1e;
      --mid:        #061428;
      --surface:    #091c38;
      --panel:      #0a1e3a;
      --border:     #0d2a50;
      --pulse:      #00f5d4;
      --pulse-dim:  #00b89c;
      --pulse-glow: rgba(0,245,212,0.15);
      --danger:     #ff2d55;
      --danger-dim: #c01a3a;
      --warn:       #ffb800;
      --energy:     #7b2fff;
      --energy-dim: #5a20cc;
      --text:       #c8e6ff;
      --text-dim:   #5a7fa0;
      --white:      #ffffff;
      --font-hud:   'Orbitron', monospace;
      --font-mono:  'Share Tech Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--abyss);
      color: var(--text);
      font-family: var(--font-mono);
      overflow: hidden;
      user-select: none;
    }

    /* ===== LAYOUT ===== */
    #app {
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    /* Animated background grid */
    #app::before {
      content: '';
      position: fixed; inset: 0;
      background:
        linear-gradient(rgba(0,245,212,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,212,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridDrift 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridDrift {
      0%   { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    /* ===== SCREENS ===== */
    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 10;
    }

    .screen.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ===== GAME CANVAS ===== */
    #gameCanvas {
      display: block;
      position: absolute;
      top: 0; left: 0;
      image-rendering: pixelated;
      z-index: 1;
    }

    /* ===== HUD ===== */
    #hud {
      position: absolute; inset: 0;
      pointer-events: none;
      z-index: 5;
      display: none;
    }
    #hud.visible { display: block; }

    .hud-corner {
      position: absolute;
      padding: 14px 18px;
    }

    #hud-tl { top: 0; left: 0; }
    #hud-tr { top: 0; right: 0; text-align: right; }
    #hud-bl { bottom: 0; left: 0; }

    .hud-label {
      font-family: var(--font-hud);
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .hud-value {
      font-family: var(--font-hud);
      font-size: 22px;
      font-weight: 700;
      color: var(--pulse);
      text-shadow: 0 0 20px var(--pulse);
      line-height: 1;
    }

    .hud-value.danger { color: var(--danger); text-shadow: 0 0 20px var(--danger); }
    .hud-value.warn   { color: var(--warn);   text-shadow: 0 0 20px var(--warn); }

    /* Health bar */
    #health-bar-wrap {
      position: absolute;
      bottom: 14px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }

    .bar-label {
      font-family: var(--font-hud);
      font-size: 8px; letter-spacing: 3px; color: var(--text-dim);
    }

    #health-bar-outer {
      width: 200px; height: 6px;
      background: rgba(255,45,85,0.15);
      border: 1px solid rgba(255,45,85,0.3);
      border-radius: 3px;
      overflow: hidden;
    }

    #health-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, var(--danger), #ff6b8a);
      box-shadow: 0 0 10px var(--danger);
      border-radius: 3px;
      transition: width 0.2s ease;
    }

    #shield-pips {
      display: flex; gap: 6px; margin-top: 2px;
    }

    .pip {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--energy);
      box-shadow: 0 0 8px var(--energy);
      transition: all 0.2s;
    }

    .pip.empty {
      background: rgba(123,47,255,0.2);
      box-shadow: none;
      border: 1px solid rgba(123,47,255,0.3);
    }

    /* Wave notification */
    #wave-notify {
      position: absolute;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-family: var(--font-hud);
      font-size: 36px;
      font-weight: 900;
      color: var(--pulse);
      text-shadow: 0 0 40px var(--pulse), 0 0 80px var(--pulse);
      letter-spacing: 4px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    /* ===== MENU SCREEN ===== */
    #menu-screen {
      background: radial-gradient(ellipse at 50% 30%, rgba(0,245,212,0.05) 0%, transparent 70%),
                  linear-gradient(180deg, rgba(1,8,18,0) 0%, var(--abyss) 100%);
    }

    .game-logo {
      font-family: var(--font-hud);
      font-size: clamp(52px, 9vw, 88px);
      font-weight: 900;
      letter-spacing: 8px;
      color: var(--white);
      text-shadow:
        0 0 40px var(--pulse),
        0 0 80px rgba(0,245,212,0.4),
        0 0 120px rgba(0,245,212,0.2);
      line-height: 1;
      margin-bottom: 4px;
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { text-shadow: 0 0 40px var(--pulse), 0 0 80px rgba(0,245,212,0.4), 0 0 120px rgba(0,245,212,0.2); }
      50% { text-shadow: 0 0 60px var(--pulse), 0 0 120px rgba(0,245,212,0.6), 0 0 180px rgba(0,245,212,0.3); }
    }

    .game-tagline {
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 5px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    /* Animated probe logo */
    .logo-probe {
      width: 120px; height: 120px;
      margin-bottom: 24px;
      animation: probeHover 4s ease-in-out infinite;
    }

    @keyframes probeHover {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%       { transform: translateY(-10px) rotate(3deg); }
    }

    .controls-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 32px;
      margin-bottom: 40px;
      padding: 20px 28px;
      background: rgba(0,245,212,0.03);
      border: 1px solid rgba(0,245,212,0.1);
      border-radius: 4px;
    }

    .ctrl-item {
      display: flex; align-items: center; gap: 10px;
      font-size: 12px; color: var(--text-dim);
    }

    kbd {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 2px 7px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--pulse);
      min-width: 28px;
    }

    .btn {
      font-family: var(--font-hud);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      padding: 14px 40px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 100%);
      pointer-events: none;
    }

    .btn-primary {
      background: var(--pulse);
      color: var(--abyss);
      box-shadow: 0 0 30px rgba(0,245,212,0.4), 0 4px 20px rgba(0,0,0,0.5);
      margin-bottom: 12px;
    }

    .btn-primary:hover {
      background: #00ffe8;
      box-shadow: 0 0 50px rgba(0,245,212,0.6), 0 4px 20px rgba(0,0,0,0.5);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--pulse);
      color: var(--pulse);
      background: var(--pulse-glow);
    }

    /* ===== LEADERBOARD SCREEN ===== */
    #lb-screen {
      background: var(--abyss);
    }

    .screen-title {
      font-family: var(--font-hud);
      font-size: 11px;
      letter-spacing: 6px;
      color: var(--pulse);
      margin-bottom: 28px;
    }

    .lb-table {
      width: min(480px, 90vw);
      border-collapse: collapse;
      margin-bottom: 28px;
    }

    .lb-table th {
      font-family: var(--font-hud);
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--text-dim);
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .lb-table td {
      padding: 10px 12px;
      font-size: 13px;
      border-bottom: 1px solid rgba(13,42,80,0.5);
    }

    .lb-table tr:hover td { background: rgba(0,245,212,0.03); }

    .rank-num {
      font-family: var(--font-hud);
      font-weight: 700;
      color: var(--text-dim);
    }

    .rank-num.gold   { color: #ffd700; text-shadow: 0 0 10px #ffd700; }
    .rank-num.silver { color: #c0c0c0; }
    .rank-num.bronze { color: #cd7f32; }

    .score-val {
      font-family: var(--font-hud);
      color: var(--pulse);
      font-weight: 700;
    }

    /* ===== GAME OVER SCREEN ===== */
    #gameover-screen {
      background: radial-gradient(ellipse at 50% 50%, rgba(255,45,85,0.06) 0%, transparent 70%);
    }

    .go-title {
      font-family: var(--font-hud);
      font-size: clamp(32px, 7vw, 64px);
      font-weight: 900;
      letter-spacing: 6px;
      color: var(--danger);
      text-shadow: 0 0 40px var(--danger);
      margin-bottom: 8px;
    }

    .go-subtitle {
      font-size: 12px;
      letter-spacing: 4px;
      color: var(--text-dim);
      margin-bottom: 36px;
    }

    .stats-row {
      display: flex; gap: 32px;
      margin-bottom: 32px;
    }

    .stat-box {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 16px 24px;
      background: rgba(0,245,212,0.03);
      border: 1px solid rgba(0,245,212,0.1);
      border-radius: 4px;
      min-width: 100px;
    }

    .stat-box .label {
      font-family: var(--font-hud);
      font-size: 8px;
      letter-spacing: 3px;
      color: var(--text-dim);
    }

    .stat-box .value {
      font-family: var(--font-hud);
      font-size: 24px;
      font-weight: 700;
      color: var(--pulse);
    }

    .name-form {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      margin-bottom: 20px;
    }

    .name-form label {
      font-family: var(--font-hud);
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--text-dim);
    }

    .name-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 10px 16px;
      font-family: var(--font-hud);
      font-size: 14px;
      font-weight: 700;
      color: var(--pulse);
      text-align: center;
      letter-spacing: 3px;
      width: 220px;
      outline: none;
      transition: border-color 0.2s;
    }

    .name-input:focus { border-color: var(--pulse); box-shadow: 0 0 15px var(--pulse-glow); }
    .name-input::placeholder { color: var(--text-dim); font-weight: 400; letter-spacing: 1px; }

    .rank-badge {
      font-family: var(--font-hud);
      font-size: 12px;
      letter-spacing: 3px;
      color: var(--warn);
      text-shadow: 0 0 10px var(--warn);
      margin-bottom: 8px;
      min-height: 20px;
    }

    /* ===== PARTICLES / bubbles overlay ===== */
    #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }

    .bubble {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(0,245,212,0.3), rgba(0,245,212,0.05));
      border: 1px solid rgba(0,245,212,0.15);
      animation: bubbleRise linear infinite;
    }

    @keyframes bubbleRise {
      0%   { transform: translateY(110vh) translateX(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) translateX(20px); opacity: 0; }
    }

    /* ===== SCANLINE FX ===== */
    #scanlines {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none; z-index: 100;
    }

    /* ===== VIGNETTE ===== */
    #vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(1,8,18,0.8) 100%);
      pointer-events: none; z-index: 99;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .controls-grid { grid-template-columns: 1fr; gap: 6px; }
      .stats-row { flex-direction: column; gap: 12px; }
    }
  </style>
</head>
<body>

<div id="app">
  <!-- Ambient particles -->
  <div id="particles"></div>

  <!-- Game Canvas -->
  <canvas id="gameCanvas"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-corner" id="hud-tl">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="hud-score">0</div>
    </div>
    <div class="hud-corner" id="hud-tr">
      <div class="hud-label">Depth</div>
      <div class="hud-value" id="hud-depth">0m</div>
      <div class="hud-label" style="margin-top:8px">Wave</div>
      <div class="hud-value" id="hud-wave">1</div>
    </div>
    <div id="health-bar-wrap">
      <div class="bar-label">HULL INTEGRITY</div>
      <div id="health-bar-outer"><div id="health-bar-inner"></div></div>
      <div id="shield-pips"></div>
    </div>
    <div id="wave-notify"></div>
  </div>

  <!-- MENU SCREEN -->
  <div class="screen active" id="menu-screen">
    <svg class="logo-probe" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Probe body -->
      <ellipse cx="60" cy="60" rx="28" ry="36" fill="#0a1e3a" stroke="#00f5d4" stroke-width="1.5"/>
      <!-- Window -->
      <ellipse cx="60" cy="52" rx="14" ry="14" fill="#030f1e" stroke="#00f5d4" stroke-width="1"/>
      <ellipse cx="60" cy="52" rx="9" ry="9" fill="rgba(0,245,212,0.15)" stroke="rgba(0,245,212,0.4)" stroke-width="0.5"/>
      <circle cx="60" cy="52" r="4" fill="rgba(0,245,212,0.6)"/>
      <!-- Thrusters -->
      <rect x="32" y="74" width="8" height="14" rx="2" fill="#061428" stroke="#00f5d4" stroke-width="1"/>
      <rect x="80" y="74" width="8" height="14" rx="2" fill="#061428" stroke="#00f5d4" stroke-width="1"/>
      <!-- Thruster glow -->
      <ellipse cx="36" cy="90" rx="5" ry="8" fill="rgba(0,245,212,0.5)" filter="blur(3px)"/>
      <ellipse cx="84" cy="90" rx="5" ry="8" fill="rgba(0,245,212,0.5)" filter="blur(3px)"/>
      <!-- Antenna -->
      <line x1="60" y1="24" x2="60" y2="10" stroke="#00f5d4" stroke-width="1.5"/>
      <circle cx="60" cy="8" r="3" fill="#00f5d4" filter="url(#glow)"/>
      <!-- Sensor arms -->
      <line x1="32" y1="58" x2="16" y2="50" stroke="#00f5d4" stroke-width="1" opacity="0.7"/>
      <line x1="88" y1="58" x2="104" y2="50" stroke="#00f5d4" stroke-width="1" opacity="0.7"/>
      <circle cx="14" cy="49" r="3" fill="#00b89c" opacity="0.8"/>
      <circle cx="106" cy="49" r="3" fill="#00b89c" opacity="0.8"/>
      <defs>
        <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
    </svg>

    <div class="game-logo">DEEP<span style="color:var(--pulse)">PULSE</span></div>
    <div class="game-tagline">Survive the Abyss</div>

    <div class="controls-grid">
      <div class="ctrl-item"><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> <span>Move Probe</span></div>
      <div class="ctrl-item"><kbd>↑↓←→</kbd> <span>Alt. Move</span></div>
      <div class="ctrl-item"><kbd>Space</kbd> <span>Shield Burst</span></div>
      <div class="ctrl-item"><kbd>Esc</kbd> <span>Pause</span></div>
    </div>

    <button class="btn btn-primary" id="btn-play">Initialize Dive</button>
    <button class="btn btn-secondary" id="btn-lb">Leaderboard</button>
  </div>

  <!-- LEADERBOARD SCREEN -->
  <div class="screen" id="lb-screen">
    <div class="screen-title">⬡ Global Leaderboard</div>
    <table class="lb-table" id="lb-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Pilot</th>
          <th>Score</th>
          <th>Depth</th>
          <th>Wave</th>
        </tr>
      </thead>
      <tbody id="lb-body">
        <tr><td colspan="5" style="text-align:center;color:var(--text-dim);padding:24px">Connecting to server...</td></tr>
      </tbody>
    </table>
    <button class="btn btn-secondary" id="btn-lb-back">← Return</button>
  </div>

  <!-- GAME OVER SCREEN -->
  <div class="screen" id="gameover-screen">
    <div class="go-title">HULL BREACH</div>
    <div class="go-subtitle">Connection to surface lost</div>

    <div class="stats-row">
      <div class="stat-box">
        <span class="label">Score</span>
        <span class="value" id="go-score">0</span>
      </div>
      <div class="stat-box">
        <span class="label">Depth</span>
        <span class="value" id="go-depth">0m</span>
      </div>
      <div class="stat-box">
        <span class="label">Wave</span>
        <span class="value" id="go-wave">1</span>
      </div>
      <div class="stat-box">
        <span class="label">Time</span>
        <span class="value" id="go-time">0s</span>
      </div>
    </div>

    <div class="name-form">
      <label for="player-name">Pilot Designation</label>
      <input type="text" id="player-name" class="name-input" maxlength="16" placeholder="Enter callsign" spellcheck="false" />
    </div>

    <div class="rank-badge" id="rank-badge"></div>

    <button class="btn btn-primary" id="btn-submit">Submit Score</button>
    <button class="btn btn-secondary" id="btn-restart" style="margin-top:10px">Dive Again</button>
    <button class="btn btn-secondary" id="btn-menu" style="margin-top:4px">Main Menu</button>
  </div>
</div>

<!-- Overlay FX -->
<div id="vignette"></div>
<div id="scanlines"></div>

<script src="../src/components/game.js"></script>
</body>
</html>
